<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment | HEXA COMPUTRONICS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Rajdhani',sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

.payment-box{
max-width:500px;
margin:40px auto;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

h1{
font-family:'Orbitron',sans-serif;
background:linear-gradient(to right,#00f3ff,#ff6b00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.qr-img{
width:220px;
margin:15px auto;
border-radius:10px;
}

.pay-btn{
display:block;
margin:15px auto;
padding:10px 20px;
background:linear-gradient(45deg,#00f3ff,#ff6b00);
color:white;
border-radius:25px;
text-decoration:none;
width:80%;
}
</style>
</head>

<body>

<div class="payment-box">

<h1>Order Summary</h1>

<p><strong>Product:</strong> <span id="productName"></span></p>
<p><strong>Amount:</strong> ₹<span id="productPrice"></span></p>
<p><strong>Order ID:</strong> <span id="orderID"></span></p>

<hr style="margin:20px 0;opacity:0.2;">

<h2>Pay via Google Pay</h2>
<img src="images/gpay-qr.jpg" class="qr-img" alt="GPay QR">

<p>After payment send screenshot on WhatsApp: 9935529306</p>

<a id="whatsappBtn" class="pay-btn" target="_blank">
Send Payment Screenshot
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const product = params.get("product");
const price = params.get("price");

document.getElementById("productName").innerText = product || "Product";
document.getElementById("productPrice").innerText = price || "0";

const orderID = "HX" + Math.floor(Math.random()*1000000);
document.getElementById("orderID").innerText = orderID;

const whatsappMessage = `Hello HEXA COMPUTRONICS,%0AOrder ID: ${orderID}%0AProduct: ${product}%0AAmount: ₹${price}%0AI have completed payment.`;
document.getElementById("whatsappBtn").href =
"https://wa.me/919935529306?text=" + whatsappMessage;

</script>

</body>
</html>
