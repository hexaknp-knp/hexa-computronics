<!DOCTYPE html>

<html>
<head>
<title>Laptop Finder</title>
<style>
body{font-family:Arial;text-align:center;background:#111;color:#fff}
select,button{padding:10px;margin:10px}
.result{margin-top:20px}
</style>
</head>
<body>

<h1>💻 Laptop Finder</h1>

<select id="use">
<option value="">Select Usage</option>
<option value="office">Office</option>
<option value="coding">Coding</option>
<option value="gaming">Gaming</option>
</select>

<button onclick="findLaptop()">Find Laptop</button>

<div class="result" id="result"></div>

<script>

function findLaptop(){

var use=document.getElementById("use").value
var result=document.getElementById("result")

if(use=="office")
result.innerHTML="Acer Aspire 3 <br><a href='https://amzn.to/4cQaYUO'>View on Amazon</a>"

if(use=="coding")
result.innerHTML="Lenovo IdeaPad Slim 3 <br><a href='https://amzn.to/4cQaYUO'>View on Amazon</a>"

if(use=="gaming")
result.innerHTML="ASUS TUF Gaming <br><a href='https://amzn.to/4cQaYUO'>View on Amazon</a>"

}

</script>

</body>
</html>
