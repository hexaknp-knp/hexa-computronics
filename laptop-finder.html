<!DOCTYPE html>

<html>
<head>
<title>Laptop Finder</title>
<style>
body{font-family:Arial;text-align:center;background:#111;color:#fff}
select,button{padding:10px;margin:10px}
.result{margin-top:20px}
</style>
</head>
<body>

<h1>💻 Laptop Finder</h1>

<select id="use">
<option value="">Select Usage</option>
<option value="office">Office</option>
<option value="coding">Coding</option>
<option value="gaming">Gaming</option>
</select>

<button onclick="findLaptop()">Find Laptop</button>

<div class="result" id="result"></div>

<script>

if(use=="office")
result.innerHTML = `
<div style="
background:#111;
padding:25px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
text-align:center;
">

<h3 style="color:#00f3ff;">Acer Aspire 3</h3>

<p>Best laptop for office work and students.</p>

<a href="https://amzn.to/4cQaYUO"
target="_blank"
style="
display:inline-block;
padding:12px 25px;
background:#007bff;
color:#fff;
border-radius:25px;
text-decoration:none;
font-weight:bold;
">

Check Price on Amazon

</a>

</div>
`

if(use=="gaming")
result.innerHTML="ASUS TUF Gaming <br><a href='https://amzn.to/4cQaYUO'>View on Amazon</a>"

}

</script>

</body>
</html>
